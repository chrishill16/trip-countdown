f<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trip Countdown</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      padding: 40px 20px;
    }

    header {
      text-align: center;
      margin-bottom: 48px;
    }

    header h1 {
      font-size: 2.5rem;
      font-weight: 700;
      color: #1a1a2e;
      letter-spacing: -0.5px;
    }

    header p {
      color: #6b7280;
      margin-top: 8px;
      font-size: 1rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 24px;
      max-width: 1100px;
      margin: 0 auto;
    }

    .card {
      background: #1e1e2e;
      border-radius: 16px;
      overflow: hidden;
      color: #fff;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.12);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.18);
    }

    .card-hero {
      width: 100%;
      height: 200px;
      object-fit: cover;
      display: block;
      background: #2d2d44;
    }

    .card-hero-video {
      width: 100%;
      height: 200px;
      object-fit: cover;
      display: block;
    }

    .card-body-wrapper {
      overflow: hidden;
      transition: height 0.35s ease;
    }

    .card-body {
      padding: 20px 24px 24px;
    }

    .card-header {
      display: flex;
      flex-direction: column;
      padding: 14px 20px;
      cursor: pointer;
      user-select: none;
    }

    .card-header-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .card-header:hover { opacity: 0.85; }

    .card-toggle {
      font-size: 1rem;
      color: rgba(255,255,255,0.5);
      transition: transform 0.3s ease;
      flex-shrink: 0;
    }

    .card-toggle.collapsed { transform: rotate(-90deg); }

    .card-destination {
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 0;
    }

    .card-dates {
      font-size: 0.85rem;
      color: #9ca3af;
      margin-top: 4px;
      margin-bottom: 0;
    }

    .countdown {
      display: flex;
      gap: 12px;
    }

    .countdown-unit {
      flex: 1;
      background: #2d2d44;
      border-radius: 10px;
      padding: 12px 8px;
      text-align: center;
    }

    .countdown-value {
      font-size: 1.8rem;
      font-weight: 700;
      line-height: 1;
      color: #a78bfa;
    }

    .countdown-label {
      font-size: 0.7rem;
      color: #9ca3af;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-top: 4px;
    }

    .departed {
      text-align: center;
      padding: 12px;
      background: #2d2d44;
      border-radius: 10px;
      color: #34d399;
      font-weight: 600;
      font-size: 0.95rem;
    }

    .card-divider {
      border: none;
      border-top: 1px solid rgba(255,255,255,0.1);
      margin: 20px 0 16px;
    }

    .currency-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .currency-name {
      font-size: 0.8rem;
      color: rgba(255,255,255,0.6);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .currency-rate {
      font-size: 0.95rem;
      font-weight: 600;
      color: #fff;
    }

    .currency-note {
      font-size: 0.7rem;
      color: rgba(255,255,255,0.4);
      margin-top: 2px;
      text-align: right;
    }

    .cta-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
    }

    .cta-btn {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: flex-end;
      padding: 10px;
      border-radius: 10px;
      color: #fff;
      text-decoration: none;
      font-size: 0.75rem;
      font-weight: 600;
      cursor: pointer;
      overflow: hidden;
      height: 80px;
      background: rgba(255,255,255,0.1);
      border: none;
    }

    .cta-btn img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 0;
    }

    .cta-btn::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.65) 0%, rgba(0,0,0,0.1) 100%);
      z-index: 1;
    }

    .cta-btn span {
      position: relative;
      z-index: 2;
      line-height: 1.2;
    }

    .cta-btn:hover img { transform: scale(1.05); transition: transform 0.3s ease; }

    .cta-icon {
      font-size: 1.2rem;
    }

    .shop-section {
      margin-top: 20px;
    }

    .section-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: rgba(255,255,255,0.45);
      margin-bottom: 10px;
    }

    .shop-items {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .shop-item {
      border-radius: 10px;
      overflow: hidden;
      background: rgba(0,0,0,0.2);
      cursor: pointer;
      transition: transform 0.15s ease;
    }

    .shop-item:hover { transform: scale(1.03); }

    .shop-item-dismiss {
      position: absolute;
      top: 5px;
      right: 5px;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: rgba(0,0,0,0.55);
      border: none;
      color: #fff;
      font-size: 0.7rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
      opacity: 0;
      transition: opacity 0.15s ease;
      z-index: 2;
    }

    .shop-item:hover .shop-item-dismiss { opacity: 1; }

    .shop-item img {
      width: 100%;
      height: 110px;
      object-fit: cover;
      display: block;
    }

    .shop-item-placeholder {
      width: 100%;
      height: 110px;
      background: rgba(0,0,0,0.3);
    }

    .shop-item-name {
      font-size: 0.68rem;
      font-weight: 500;
      color: rgba(255,255,255,0.85);
      padding: 6px 8px;
      line-height: 1.2;
    }

    .upgrade-banner {
      margin-top: 20px;
      display: flex;
      flex-direction: column;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      padding: 12px 14px;
    }

    .upgrade-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .upgrade-icon {
      font-size: 1.4rem;
      flex-shrink: 0;
    }

    .upgrade-info {
      flex: 1;
    }

    .upgrade-title {
      font-size: 0.85rem;
      font-weight: 600;
      color: #fff;
    }

    .upgrade-desc {
      font-size: 0.72rem;
      color: rgba(255,255,255,0.5);
      margin-top: 2px;
    }

    .upgrade-btn {
      background: #E4002B;
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 0.72rem;
      font-weight: 700;
      padding: 7px 12px;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
      transition: opacity 0.15s ease;
    }

    .upgrade-btn:hover { opacity: 0.85; }

    .weather-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(255,255,255,0.07);
      border-radius: 10px;
      padding: 10px 14px;
      margin-bottom: 20px;
    }

    .weather-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .weather-icon { font-size: 1.6rem; }

    .weather-condition {
      font-size: 0.85rem;
      font-weight: 500;
      color: #fff;
    }

    .weather-label {
      font-size: 0.68rem;
      color: rgba(255,255,255,0.45);
      margin-top: 1px;
    }

    .weather-temps {
      text-align: right;
    }

    .weather-high {
      font-size: 1.1rem;
      font-weight: 700;
      color: #fff;
    }

    .weather-low {
      font-size: 0.75rem;
      color: rgba(255,255,255,0.45);
    }

    @media (max-width: 480px) {
      header h1 {
        font-size: 1.8rem;
      }

      .countdown-value {
        font-size: 1.4rem;
      }
    }
  </style>
</head>
<body>

  <header>
    <h1>Trip Countdown</h1>
    <p>Your upcoming adventures</p>
  </header>

  <div class="grid" id="grid"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/color-thief/2.3.0/color-thief.umd.js"></script>
  <script>
    const PEXELS_API_KEY = "TOhSjuicGTkXug3yf2beIeXaUCMhO1jrtBvj0pZjk1KAf6iw3YFEMK08";

    async function fetchPexelsPhoto(query) {
      const res = await fetch(
        `https://api.pexels.com/v1/search?query=${encodeURIComponent(query)}&per_page=1&orientation=square`,
        { headers: { Authorization: PEXELS_API_KEY } }
      );
      const data = await res.json();
      return data.photos?.[0]?.src?.medium || null;
    }

    async function fetchPexelsVideo(query, videoId) {
      if (videoId) {
        const res = await fetch(`https://api.pexels.com/videos/videos/${videoId}`, { headers: { Authorization: PEXELS_API_KEY } });
        const data = await res.json();
        const file = data.video_files
          .filter(f => f.file_type === "video/mp4")
          .sort((a, b) => b.width - a.width)
          .find(f => f.width <= 1280);
        return file?.link || null;
      }
      const res = await fetch(
        `https://api.pexels.com/videos/search?query=${encodeURIComponent(query)}&per_page=5&orientation=landscape`,
        { headers: { Authorization: PEXELS_API_KEY } }
      );
      const data = await res.json();
      const video = data.videos?.[0];
      if (!video) return null;
      const file = video.video_files
        .filter(f => f.quality === "hd" || f.quality === "sd")
        .sort((a, b) => b.width - a.width)[0];
      return file?.link || null;
    }

    const trips = [
      {

        shopItems: [
          { label: "Headphones", image: "https://cdn.mos.cms.futurecdn.net/HMCWShKerkfeNQmYYhE3p7-1200-80.jpg.webp" },

          { label: "Jackets", image: "https://yaffa-cdn.s3.amazonaws.com/yaffadsp/images/dmImage/StandardImage/david-jones-aw22-campaign---feb-22.jpg", logo: "https://images.squarespace-cdn.com/content/v1/5701c6453c44d887e796d0ad/1479555141486-2Z3TBH8PH19LENFFUFMW/image-asset.jpeg?format=750w" },
          { label: "Hats & Scarves", image: "https://cached.imagescaler.hbpl.co.uk/resize/scaleWidth/1486/cached.offlinehbpl.hbpl.co.uk/news/OMC/276769D8-D7CA-D297-CE4A92E19097296D.gif" },
        ],
      },
    ];

    function formatDate(date) {
      return date.toLocaleDateString("en-GB", { day: "numeric", month: "short", year: "numeric" });
    }

    function getCountdown(departure) {
      const now = new Date();
      const diff = departure - now;
      if (diff <= 0) return null;
      const days = Math.floor(diff / (1000 * 60 * 60 * 24));
      const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
      const seconds = Math.floor((diff % (1000 * 60)) / 1000);
      return { days, hours, minutes, seconds };
    }

    function renderCard(trip) {
      const card = document.createElement("div");
      card.className = "card";

      const hero = document.createElement("img");
      hero.className = "card-hero";
      hero.src = trip.image;
      hero.alt = trip.destination;

      // Collapsible header
      const header = document.createElement("div");
      header.className = "card-header";

      const headerRow = document.createElement("div");
      headerRow.className = "card-header-row";
      const dest = document.createElement("div");
      dest.className = "card-destination";
      dest.innerHTML = `<span style="margin-right:8px">${trip.flag}</span>${trip.destination}`;
      const toggle = document.createElement("span");
      toggle.className = "card-toggle";
      toggle.textContent = "▾";
      headerRow.appendChild(dest);
      headerRow.appendChild(toggle);

      const dates = document.createElement("div");
      dates.className = "card-dates";
      dates.textContent = `${formatDate(trip.departureDate)} — ${formatDate(trip.returnDate)}`;

      header.appendChild(headerRow);
      header.appendChild(dates);

      const bodyWrapper = document.createElement("div");
      bodyWrapper.className = "card-body-wrapper";
      const body = document.createElement("div");
      body.className = "card-body";
      bodyWrapper.appendChild(body);

      header.addEventListener("click", () => {
        const isCollapsed = bodyWrapper.style.height === "0px";
        if (isCollapsed) {
          bodyWrapper.style.height = bodyWrapper.scrollHeight + "px";
          bodyWrapper.addEventListener("transitionend", () => {
            bodyWrapper.style.height = "auto";
          }, { once: true });
          toggle.classList.remove("collapsed");
        } else {
          bodyWrapper.style.height = bodyWrapper.scrollHeight + "px";
          bodyWrapper.getBoundingClientRect(); // force reflow so transition fires
          bodyWrapper.style.height = "0px";
          toggle.classList.add("collapsed");
        }
      });

      const countdownEl = document.createElement("div");
      countdownEl.className = "countdown";

      function updateCountdown() {
        const cd = getCountdown(trip.departureDate);
        countdownEl.innerHTML = "";

        if (!cd) {
          const msg = document.createElement("div");
          msg.className = "departed";
          msg.textContent = "✈️ Trip underway or completed";
          countdownEl.appendChild(msg);
          return;
        }

        [["Days", cd.days], ["Hours", cd.hours], ["Mins", cd.minutes], ["Secs", cd.seconds]].forEach(([label, value]) => {
          const unit = document.createElement("div");
          unit.className = "countdown-unit";
          unit.innerHTML = `
            <div class="countdown-value">${String(value).padStart(2, "0")}</div>
            <div class="countdown-label">${label}</div>
          `;
          countdownEl.appendChild(unit);
        });
      }

      updateCountdown();
      setInterval(updateCountdown, 1000);

      // Currency bar
      const divider = document.createElement("hr");
      divider.className = "card-divider";

      const currencyBar = document.createElement("div");
      currencyBar.className = "currency-bar";
      currencyBar.innerHTML = `
        <div>
          <div class="currency-name">${trip.currency.name} (${trip.currency.code})</div>
          <div class="currency-note">Approx. rate — verify before buying</div>
        </div>
        <div>
          <div class="currency-rate">A$1 = ${trip.currency.symbol}${trip.currency.rateFromAUD.toFixed(2)}</div>
        </div>
      `;

      // CTA buttons
      const ctaGrid = document.createElement("div");
      ctaGrid.className = "cta-grid";

      const ctaLinks = [
        { label: `Buy ${trip.currency.name}`, href: `https://www.google.com/search?q=buy+${trip.currency.code}+${trip.currency.name}+Australia`, photoSearch: `${trip.currency.code} currency money exchange` },
        { label: "Destination Guide", href: `https://www.google.com/search?q=${encodeURIComponent(trip.guideSearch)}`, photoSearch: trip.videoSearch },
        { label: "Hire a Car", href: `https://www.google.com/search?q=${encodeURIComponent(trip.carHireSearch)}`, photoSearch: "rental car road trip" },
      ];

      ctaLinks.forEach(({ label, href, photoSearch }) => {
        const btn = document.createElement("a");
        btn.className = "cta-btn";
        btn.href = href;
        btn.target = "_blank";
        btn.rel = "noopener noreferrer";
        btn.innerHTML = `<span>${label}</span>`;
        fetchPexelsPhoto(photoSearch).then(url => {
          if (url) {
            const img = document.createElement("img");
            img.src = url;
            img.alt = label;
            btn.insertBefore(img, btn.firstChild);
          }
        }).catch(() => {});
        ctaGrid.appendChild(btn);
      });

      // Shop section
      const shopSection = document.createElement("div");
      shopSection.className = "shop-section";
      shopSection.innerHTML = `<div class="section-label">Shop for your trip</div>`;
      const shopItems = document.createElement("div");
      shopItems.className = "shop-items";
      trip.shopItems.forEach(shopItem => {
        const item = document.createElement("div");
        item.className = "shop-item";
        const label = shopItem.label || shopItem.split(" ").slice(0, 2).map(w => w[0].toUpperCase() + w.slice(1)).join(" ");
        item.innerHTML = `<div class="shop-item-placeholder"></div><div class="shop-item-name">${label}</div>`;
        const dismissBtn = `<button class="shop-item-dismiss" title="Remove">✕</button>`;
        if (shopItem.image) {
          const logoHtml = shopItem.logo
            ? `<img src="${shopItem.logo}" alt="brand" style="position:absolute;bottom:6px;right:6px;width:36px;height:36px;object-fit:contain;border-radius:4px;background:rgba(255,255,255,0.9);padding:3px;" />`
            : "";
          item.innerHTML = `<div style="position:relative"><img src="${shopItem.image}" alt="${label}" style="width:100%;height:110px;object-fit:cover;display:block;" />${logoHtml}${dismissBtn}</div><div class="shop-item-name">${label}</div>`;
        } else {
          const query = shopItem.query || shopItem;
          item.innerHTML = `<div style="position:relative"><div class="shop-item-placeholder"></div>${dismissBtn}</div><div class="shop-item-name">${label}</div>`;
          fetchPexelsPhoto(query).then(url => {
            if (url) item.innerHTML = `<div style="position:relative"><img src="${url}" alt="${label}" style="width:100%;height:110px;object-fit:cover;display:block;" />${dismissBtn}</div><div class="shop-item-name">${label}</div>`;
            item.querySelector(".shop-item-dismiss").addEventListener("click", e => { e.stopPropagation(); item.remove(); });
          }).catch(() => {});
        }
        item.querySelector(".shop-item-dismiss")?.addEventListener("click", e => { e.stopPropagation(); item.remove(); });
        shopItems.appendChild(item);
      });
      shopSection.appendChild(shopItems);

      // Upgrade banner
      const upgradeBanner = document.createElement("div");
      upgradeBanner.className = "upgrade-banner";
      upgradeBanner.innerHTML = `
        <div style="font-size:0.7rem;text-transform:uppercase;letter-spacing:0.6px;color:rgba(255,255,255,0.45);margin-bottom:12px;">Treat Yourself!</div>
        <div class="upgrade-row">
          <div class="upgrade-icon">🍳</div>
          <div class="upgrade-info">
            <div class="upgrade-title">Add Breakfast</div>
            <div class="upgrade-desc">5,000 pts</div>
          </div>
          <button class="upgrade-btn">Use Points</button>
        </div>
        <div style="border-top:1px solid rgba(255,255,255,0.08);margin:10px 0;"></div>
        <div class="upgrade-row">
          <div class="upgrade-icon">🛏️</div>
          <div class="upgrade-info">
            <div class="upgrade-title">Late Checkout</div>
            <div class="upgrade-desc">2,000 pts</div>
          </div>
          <button class="upgrade-btn">Use Points</button>
        </div>
      `;

      const weatherBar = document.createElement("div");
      weatherBar.className = "weather-bar";
      weatherBar.innerHTML = `
        <div class="weather-left">
          <div class="weather-icon">${trip.weather.icon}</div>
          <div>
            <div class="weather-condition">${trip.weather.condition}</div>
            <div class="weather-label">At departure</div>
          </div>
        </div>
        <div class="weather-temps">
          <div class="weather-high">${trip.weather.high}°C</div>
          <div class="weather-low">Low ${trip.weather.low}°C</div>
        </div>
      `;

      body.appendChild(weatherBar);
      body.appendChild(countdownEl);
      body.appendChild(divider);
      body.appendChild(currencyBar);
      body.appendChild(ctaGrid);
      body.appendChild(shopSection);
      body.appendChild(upgradeBanner);
      card.appendChild(hero);
      card.appendChild(header);
      card.appendChild(bodyWrapper);

      // Apply color from the fallback image
      const colorThief = new ColorThief();
      hero.crossOrigin = "anonymous";

      function applyColors(img) {
        try {
          let cardBg, bodyBg;
          if (trip.themeColor) {
            cardBg = trip.themeColor.card;
            bodyBg = trip.themeColor.body;
          } else {
            const [r, g, b] = colorThief.getColor(img);
            cardBg = `rgb(${r}, ${g}, ${b})`;
            bodyBg = `rgb(${Math.floor(r * 0.6)}, ${Math.floor(g * 0.6)}, ${Math.floor(b * 0.6)})`;
          }
          card.style.background = cardBg;
          body.style.background = bodyBg;
          body.querySelectorAll(".countdown-unit").forEach(u => u.style.background = `rgba(0,0,0,0.2)`);
        } catch (e) {}
      }

      hero.addEventListener("load", () => applyColors(hero));

      // Fetch Pexels video and swap hero
      const videoPromise = trip.videoUrl
        ? Promise.resolve(trip.videoUrl)
        : fetchPexelsVideo(trip.videoSearch, trip.videoId);
      videoPromise.then(videoUrl => {
        if (!videoUrl) return;
        const video = document.createElement("video");
        video.className = "card-hero-video";
        video.src = videoUrl;
        video.autoplay = true;
        video.muted = true;
        video.loop = true;
        video.playsInline = true;
        card.replaceChild(video, hero);
      }).catch(() => {});

      return card;
    }

    const grid = document.getElementById("grid");
    trips.forEach(trip => grid.appendChild(renderCard(trip)));
  </script>

</body>
</html>
